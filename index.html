<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flat Drum School 東京校 - バンドメンバー募集</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div>
                <h1 class="app-main-title" id="app-title-display" style="line-height:1.3; margin-bottom:4px;">Flat Drum
                    School</h1>
                <h2 class="app-sub-title">バンドメンバー募集ボード</h2>
            </div>
            <div style="display:flex; gap:12px; margin-top:20px;">
                <button id="switch-branch-btn" class="secondary-btn"
                    style="flex:1; padding:12px; font-size:0.95rem; border:1px solid rgba(255,255,255,0.2); display:flex; justify-content:center; align-items:center; gap:6px; margin:0;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    スクール選択
                </button>
                <button id="add-btn" class="primary-btn" style="flex:1.5; padding:12px; font-size:1.05rem; margin:0;">
                    ＋ 新規募集
                </button>
            </div>
        </header>

        <main id="list-container">
            <!-- Items injected by JS -->
        </main>
    </div>

    <!-- Branch Selection Modal -->
    <div id="branch-modal-overlay" class="modal">
        <div class="modal-content"
            style="text-align: center; max-width: 400px; margin: 0 auto; padding: 30px 20px; position:relative;">
            <button type="button" id="branch-modal-close-btn" class="hidden"
                style="position:absolute; top:12px; right:16px; background:transparent; border:none; color:var(--text-muted); font-size:1.8rem; cursor:pointer;">×</button>
            <h2 style="margin-bottom: 12px; font-size:1.4rem;">スクールの選択</h2>
            <p style="margin-bottom: 24px; color: var(--text-muted); font-size:0.95rem;">どちらの募集ボードを表示しますか？</p>
            <div style="display:flex; flex-direction:column; gap:16px;">
                <button id="branch-tokyo-btn" class="primary-btn"
                    style="font-size:1.1rem; padding:14px; display:flex; justify-content:center; align-items:center; gap:8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                        <path d="M9 22v-4h6v4"></path>
                        <path d="M8 6h.01"></path>
                        <path d="M16 6h.01"></path>
                        <path d="M12 6h.01"></path>
                        <path d="M12 10h.01"></path>
                        <path d="M16 10h.01"></path>
                        <path d="M8 10h.01"></path>
                        <path d="M12 14h.01"></path>
                        <path d="M16 14h.01"></path>
                        <path d="M8 14h.01"></path>
                    </svg>
                    東京校
                </button>
                <button id="branch-osaka-btn" class="primary-btn"
                    style="font-size:1.1rem; padding:14px; background:linear-gradient(135deg, #10b981 0%, #059669 100%); display:flex; justify-content:center; align-items:center; gap:8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                        <path d="M9 22v-4h6v4"></path>
                        <path d="M8 6h.01"></path>
                        <path d="M16 6h.01"></path>
                        <path d="M12 6h.01"></path>
                        <path d="M12 10h.01"></path>
                        <path d="M16 10h.01"></path>
                        <path d="M8 10h.01"></path>
                        <path d="M12 14h.01"></path>
                        <path d="M16 14h.01"></path>
                        <path d="M8 14h.01"></path>
                    </svg>
                    大阪校
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">新規募集</h2>
            <form id="recruitment-form">
                <input type="hidden" id="item-id">

                <div class="form-group" id="status-group">
                    <label>募集ステータス</label>
                    <select id="status" required>
                        <option value="募集中">募集中</option>
                        <option value="締め切り">締め切り</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>投稿者名</label>
                    <input type="text" id="author" required placeholder="例: 山田太郎">
                </div>

                <div class="form-group">
                    <label>アーティスト名</label>
                    <input type="text" id="artist" required placeholder="例: BUMP OF CHICKEN">
                </div>

                <div class="form-group">
                    <label>曲名</label>
                    <input type="text" id="song" required placeholder="例: 天体観測">
                </div>

                <div class="form-group">
                    <label>一言コメント（任意）</label>
                    <input type="text" id="board-comment" placeholder="例: 初心者歓迎！楽しくやりましょう">
                </div>

                <div class="form-group">
                    <label>希望パート</label>
                    <div class="checkbox-group">
                        <div class="part-row">
                            <label><input type="checkbox" name="part" value="Vo."> Vo.</label>
                            <div class="part-count-wrapper">
                                <button type="button" class="spin-btn decrease-btn" disabled>－</button>
                                <input type="number" name="part_count_Vo." min="1" max="99" value="1" disabled
                                    class="part-num-input" readonly>
                                <button type="button" class="spin-btn increase-btn" disabled>＋</button>
                                <span>人</span>
                            </div>
                        </div>

                        <div class="part-row">
                            <label><input type="checkbox" name="part" value="Gt."> Gt.</label>
                            <div class="part-count-wrapper">
                                <button type="button" class="spin-btn decrease-btn" disabled>－</button>
                                <input type="number" name="part_count_Gt." min="1" max="99" value="1" disabled
                                    class="part-num-input" readonly>
                                <button type="button" class="spin-btn increase-btn" disabled>＋</button>
                                <span>人</span>
                            </div>
                        </div>
                        <div class="part-row">
                            <label><input type="checkbox" name="part" value="Ba."> Ba.</label>
                            <div class="part-count-wrapper">
                                <button type="button" class="spin-btn decrease-btn" disabled>－</button>
                                <input type="number" name="part_count_Ba." min="1" max="99" value="1" disabled
                                    class="part-num-input" readonly>
                                <button type="button" class="spin-btn increase-btn" disabled>＋</button>
                                <span>人</span>
                            </div>
                        </div>
                        <div class="part-row">
                            <label><input type="checkbox" name="part" value="Dr."> Dr.</label>
                            <div class="part-count-wrapper">
                                <button type="button" class="spin-btn decrease-btn" disabled>－</button>
                                <input type="number" name="part_count_Dr." min="1" max="99" value="1" disabled
                                    class="part-num-input" readonly>
                                <button type="button" class="spin-btn increase-btn" disabled>＋</button>
                                <span>人</span>
                            </div>
                        </div>
                        <!-- 任意の楽器（その他）を動的に追加するセクション -->
                        <div id="custom-parts-container"></div>
                        <div style="margin-top: 12px;">
                            <button type="button" id="add-other-part-btn" class="secondary-btn"
                                style="padding: 6px 12px; font-size: 0.85rem; width: 100%; border: 1px dashed rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); color: var(--text-main);">＋
                                その他の楽器を追加</button>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="secondary-btn">キャンセル</button>
                    <button type="submit" class="primary-btn">保存する</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal hidden">
        <div class="modal-content">
            <div id="detail-content" style="margin-bottom: 24px;">
                <!-- Dynamically injected -->
            </div>
            <div class="modal-actions">
                <button type="button" id="detail-close-btn" class="secondary-btn">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Candidate Modal -->
    <div id="candidate-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="candidate-modal-title">パートに立候補</h2>
            <form id="candidate-form">
                <input type="hidden" id="candidate-item-id">
                <input type="hidden" id="candidate-part">
                <input type="hidden" id="candidate-index">

                <div class="form-group">
                    <label>お名前</label>
                    <input type="text" id="candidate-name" required placeholder="例: 山田太郎">
                </div>

                <div class="form-group">
                    <label>一言コメント（任意）</label>
                    <input type="text" id="candidate-note" placeholder="例: よろしくお願いします！">
                </div>

                <div class="modal-actions">
                    <button type="button" id="candidate-cancel-btn" class="secondary-btn">キャンセル</button>
                    <button type="submit" class="primary-btn">立候補する</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="modal hidden" style="z-index: 9999; background: rgba(15, 23, 42, 0.9);">
        <div
            style="color: white; font-size: 1.1rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 16px;">
            <div class="loader-spinner"></div>
            <span>サーバーと通信中...</span>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
